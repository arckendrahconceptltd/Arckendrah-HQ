<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arckendrah | Executive Ledger</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { 
            background-color: #020617; 
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, transparent 70%);
            color: #f8fafc; 
            font-family: 'Rajdhani', sans-serif; 
            padding: 40px 20px; 
            max-width: 1200px; 
            margin: 0 auto;
            letter-spacing: 0.05em;
        }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(249, 115, 22, 0.3); padding-bottom: 20px; margin-bottom: 40px; }
        .logo { font-size: 28px; font-weight: 800; font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 0.1em; }
        .logo span { color: #f97316; }
        /* Header Container */
.header { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    border-bottom: 1px solid rgba(249, 115, 22, 0.3); 
    padding-bottom: 20px; 
    margin-bottom: 40px; 
}

/* Upgraded Image Logo Styling */
.logo-img { 
    height: 85px; /* Perfect height for an executive dashboard */
    width: auto; 
    object-fit: contain;
    border-radius: 4px; /* Softens the sharp corners of the JPG */
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); /* Adds depth to the image */
    transition: all 0.3s ease-in-out; /* Smooth animation timing */
    cursor: pointer;
}

/* Institutional Hover Effect */
.logo-img:hover {
    box-shadow: 0 0 18px rgba(249, 115, 22, 0.3); /* Emits a subtle gold/orange glow to match your theme */
    transform: translateY(-1px); /* Slight lift effect when hovered */
}

/* User Badge (Untouched - Your styling here was already perfect) */
.user-badge { 
    background: rgba(15, 23, 42, 0.8); 
    padding: 10px 20px; 
    border-radius: 4px; 
    font-size: 14px; 
    border: 1px solid rgba(249, 115, 22, 0.3); 
    font-family: 'Orbitron', sans-serif; 
    text-transform: uppercase; 
    letter-spacing: 1px; 
    display: flex; 
    align-items: center; 
    gap: 10px; 
    box-shadow: 0 0 15px rgba(249, 115, 22, 0.1); 
}

        /* KPI Cards */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-bottom: 50px; }
        .card { background: rgba(15, 23, 42, 0.6); padding: 30px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: #f97316; }
        .card h3 { color: #94a3b8; font-size: 14px; text-transform: uppercase; margin-top: 0; letter-spacing: 2px; font-family: 'Orbitron', sans-serif; }
        .value { font-size: 42px; font-weight: 700; margin: 15px 0 0 0; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .status-dot { display: inline-block; width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; }
        .status-dot.pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }

        /* The Control Panel (Form) */
        .control-panel { background: rgba(15, 23, 42, 0.6); padding: 30px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 40px; backdrop-filter: blur(10px); }
        .panel-title { margin-bottom: 25px; font-size: 18px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 15px; font-family: 'Orbitron', sans-serif; color: #f97316; display: flex; align-items: center; gap: 10px; }
        .form-row { display: grid; grid-template-columns: 2fr 2fr 1.5fr 1.5fr auto; gap: 15px; }
        input, select { padding: 14px; background: #020617; border: 1px solid #334155; color: white; border-radius: 4px; outline: none; font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 500; transition: 0.3s; }
        input:focus, select:focus { border-color: #f97316; box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2); }
        button.add-btn { background: linear-gradient(to right, #ea580c, #f97316); color: white; border: none; padding: 14px 30px; border-radius: 4px; cursor: pointer; font-weight: 800; font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3); }
        button.add-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(249, 115, 22, 0.5); }

        /* The Database Table */
        .table-container { background: rgba(15, 23, 42, 0.6); padding: 0 30px 30px 30px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: #94a3b8; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding: 25px 10px; font-size: 13px; font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 20px 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-size: 17px; font-weight: 500; }
        
        .tag { padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: 700; font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 1px; border: 1px solid transparent; }
        .tag-active { background: rgba(34, 197, 94, 0.1); color: #22c55e; border-color: rgba(34, 197, 94, 0.3); }
        .tag-pending { background: rgba(245, 158, 11, 0.1); color: #fbbf24; border-color: rgba(245, 158, 11, 0.3); }
        .tag-secured { background: rgba(56, 182, 255, 0.1); color: #38b6ff; border-color: rgba(56, 182, 255, 0.3); }
        
        .delete-btn { color: #ef4444; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); cursor: pointer; font-size: 14px; width: 32px; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .delete-btn:hover { background: #ef4444; color: white; }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .form-row { grid-template-columns: 1fr 1fr; }
            .form-row button { grid-column: span 2; }
        }
        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .form-row button { grid-column: span 1; }
            .card-grid { grid-template-columns: 1fr; }
            table { display: block; overflow-x: auto; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">ARCK<span>EN</span>DRAH <span style="font-size: 14px; color: #64748b; font-family: 'Rajdhani', sans-serif;">// EXECUTIVE LEDGER</span></div>
        <div class="user-badge"><span class="status-dot pulse"></span> NETWORK SECURE</div>
    </div>

    <div class="card-grid">
        <div class="card">
            <h3>Total Capital Allocated</h3>
            <div class="value" id="totalValue">€0</div>
        </div>
        <div class="card">
            <h3>Active Syndicates</h3>
            <div class="value" id="dealCount">0</div>
        </div>
    </div>

    <div class="control-panel">
        <div class="panel-title"><i class="fa-solid fa-plus text-orange-500"></i> Append New Contract</div>
        <div class="form-row">
            <input type="text" id="clientName" placeholder="Entity / Syndicate Name (e.g. UAA Patron)">
            <input type="text" id="dealProduct" placeholder="Asset Class (e.g. Platinum Vanguard)">
            <input type="number" id="dealValue" placeholder="Capital Value (€)">
            <select id="dealStatus">
                <option value="Pending">Pending Clearance</option>
                <option value="Active">Capital Active</option>
                <option value="Secured">Contract Secured</option>
            </select>
            <button class="add-btn" onclick="addDeal()">Authorize</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>SYNDICATE ENTITY</th>
                    <th>ASSET CLASS</th>
                    <th>ALLOCATION</th>
                    <th>LEDGER STATUS</th>
                    <th>REVOKE</th>
                </tr>
            </thead>
            <tbody id="dealTable">
                </tbody>
        </table>
    </div>

    <script>
        // 1. Security Check (Login)
        const password = "CEO"; 
        if (sessionStorage.getItem("loggedIn") !== "true") {
            let entry = prompt("ARCKENDRAH ENCRYPTED TERMINAL \nEnter Executive Authorization:");
            if (entry !== password) {
                window.location.href = "index.html"; 
            } else {
                sessionStorage.setItem("loggedIn", "true");
            }
        }

        // 2. Load Database on Startup
        let deals = JSON.parse(localStorage.getItem('arckendrahDeals')) || [];
        renderTable();

        // 3. Function to Add a Deal
        function addDeal() {
            const client = document.getElementById('clientName').value;
            const product = document.getElementById('dealProduct').value;
            const value = document.getElementById('dealValue').value;
            const status = document.getElementById('dealStatus').value;

            if(client && product && value) {
                const newDeal = { client, product, value, status, id: Date.now() };
                deals.push(newDeal);
                saveAndRender();
                clearInputs();
            } else {
                alert("Authorization Denied: Incomplete Ledger Entry.");
            }
        }

        // 4. Function to Delete a Deal
        function deleteDeal(id) {
            if(confirm('WARNING: Revoke this contract from the ledger?')) {
                deals = deals.filter(deal => deal.id !== id);
                saveAndRender();
            }
        }

        // 5. Core System: Save to Browser Memory & Update Screen
        function saveAndRender() {
            localStorage.setItem('arckendrahDeals', JSON.stringify(deals));
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('dealTable');
            tbody.innerHTML = '';
            let totalVal = 0;

            deals.forEach(deal => {
                totalVal += parseInt(deal.value);
                
                // Determine CSS class based on status
                let statusClass = 'tag-pending';
                if(deal.status === 'Active') statusClass = 'tag-active';
                if(deal.status === 'Secured') statusClass = 'tag-secured';
                
                const row = `
                    <tr>
                        <td style="color: #cbd5e1;"><strong>${deal.client}</strong></td>
                        <td style="color: #94a3b8;">${deal.product}</td>
                        <td style="color: #f8fafc; font-family: 'Orbitron', sans-serif;">€${parseInt(deal.value).toLocaleString()}</td>
                        <td><span class="tag ${statusClass}">${deal.status}</span></td>
                        <td><button class="delete-btn" onclick="deleteDeal(${deal.id})"><i class="fa-solid fa-xmark"></i></button></td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });

            // Update KPI Cards
            document.getElementById('dealCount').innerText = deals.length;
            document.getElementById('totalValue').innerText = '€' + totalVal.toLocaleString();
        }

        function clearInputs() {
            document.getElementById('clientName').value = '';
            document.getElementById('dealProduct').value = '';
            document.getElementById('dealValue').value = '';
        }
    </script>
</body>
</html>
